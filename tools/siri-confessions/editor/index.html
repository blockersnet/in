/* ==============================
   MCS LOCK SCREEN FULL CSS
   ============================== */

#mcs-overlay{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at top, #020617, #000);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    padding: 20px;
    box-sizing: border-box;
    overflow: hidden;
}

/* CARD */
.mcs-card{
    display: flex;
    flex-direction: column;  /* stack logo, title, input, button vertically */
    align-items: center;     /* horizontal center */
    justify-content: center; /* vertical center inside card */
    gap: 14px;               /* space between items */
    width: calc(100% - 40px);
    max-width: 300px;
    padding: 28px 22px;
    background: rgba(15,23,42,0.92);
    border-radius: 18px;
    text-align: center;
    color: white;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,194,255,0.25);
    box-shadow:
        0 0 25px rgba(0,194,255,0.18),
        0 0 70px rgba(0,0,0,0.9);
}

/* LOGO */
.mcs-logo{
    width: 52px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 10px #00C2FF);
}

/* TITLE */
.mcs-title{
    font-size: 14px;
    line-height: 1.4;
    margin-bottom: 18px;
    color: #cbd5f5;
}
.mcs-title span{
    color: #00C2FF;
    font-weight: 700;
}

/* INPUT */
#mcs-pass{
    width: 100%;
    max-width: 220px; /* keeps it small and centered */
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,194,255,0.25);
    background: #020617;
    color: white;
    text-align: center;
    font-size: 13px;
    box-sizing: border-box;
}
#mcs-pass:focus{
    outline: none;
    border-color: #00C2FF;
    box-shadow: 0 0 10px #00C2FF;
}

/* BUTTON */
button{
    width: 100%;
    max-width: 220px;  /* same width as input */
    padding: 11px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00C2FF, #6366F1);
    color: white;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: .04em;
    transition: .25s;
}
button:hover{
    transform: translateY(-2px);
    box-shadow: 0 0 10px #00C2FF;
}

/* ERROR MESSAGE */
.mcs-error{
    color: #FF3B30;
    font-size: 12px;
    display: none;
}

/* Responsive tweaks */
@media(max-width:380px){
    #mcs-pass, button{
        max-width: 90%; /* fit smaller devices */
    }
}

/* LOCK SCREEN ONLY */
#mcs-overlay {
    overflow: hidden;       /* no scroll kwenye lock overlay tu */
    user-select: none;      /* disable select text kwenye lock overlay tu */
    touch-action: none;     /* disable pinch-zoom / touch gestures */
}

<div class="admin-subtitle">Bandika hadithi yako kisha gusa kitufe chini kuzalisha posters za HD.</div>
<div class="input-box">
<textarea id="txtIn" placeholder="Bandika hadithi hapa..."></textarea>

<button class="btn-gen" onclick="run()"><span class="btn-gen-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(56,189,248,0.95)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span><span class="btn-gen-label">Generate posters</span></button>

  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  DOWNLOAD ALL — ZIP
</button>

  <div class="dl-progress-text">Inapack poster <span id="dl-cur">0</span> / <span id="dl-tot">0</span> ndani ya ZIP</div>
  <div class="dl-bar-outer"><div class="dl-bar-inner" id="dl-bar"></div></div>

<script>
const TEXT_WIDTH = 800;
const BOX_MAX_H = 600;
const FONT_SIZE = 38;
const LINE_HEIGHT = 1.4;

// ── SESSION ID ────────────────────────────────────────────────────────
// Unique per page load. Stays fixed across all downloads in this session.
// Changes only on browser refresh. Uses crypto API for true randomness.
const SESSION_ID = (function(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  const buf = new Uint8Array(28);
  crypto.getRandomValues(buf);
  return Array.from(buf).map(b => chars[b % chars.length]).join('');
})();

function run(){
const raw=document.getElementById('txtIn').value;
const output=document.getElementById('output-area');
output.innerHTML='';
hideDlAll();
if(!raw.trim()) return;
const pages=calculatePages(raw);
pages.forEach((page,i)=>{
renderPoster(page,i+1,pages.length);
});
if(pages.length>0) showDlAll(pages.length);
}

function calculatePages(text){
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
ctx.font=`700 ${FONT_SIZE}pt 'Inter'`;
const words=text.split(/\s+/);
let pages=[];
let currentLines=[];
let currentLine="";
words.forEach(word=>{
let testLine=currentLine===""?word:currentLine+" "+word;
if(ctx.measureText(testLine).width>TEXT_WIDTH){
if((currentLines.length+1)*(FONT_SIZE*LINE_HEIGHT*1.33)>BOX_MAX_H){
pages.push([...currentLines]);
currentLines=[currentLine];
currentLine=word;
}else{
currentLines.push(currentLine);
currentLine=word;
}
}else{
currentLine=testLine;
}
});
if(currentLine) currentLines.push(currentLine);
if(currentLines.length>0) pages.push(currentLines);
return pages;
}

// ── Helpers ───────────────────────────────────────────────────────────
function showDlAll(total){
const wrap=document.getElementById('dl-all-wrap');
wrap.style.display='flex';
document.getElementById('dl-tot').textContent=total;
}

function hideDlAll(){
const wrap=document.getElementById('dl-all-wrap');
wrap.style.display='none';
document.getElementById('dl-progress-box').style.display='none';
setDlProgress(0,0,'');
}

function setDlProgress(current,total,stepLabel){
document.getElementById('dl-cur').textContent=current;
document.getElementById('dl-tot').textContent=total;
document.getElementById('dl-bar').style.width=total>0?(current/total*100)+'%':'0%';
document.getElementById('dl-step-label').textContent=stepLabel;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Zero-pad: 1 of 10 → "01", 1 of 100 → "001"
function pad(n,total){
const digits=String(total).length;
return String(n).padStart(Math.max(digits,2),'0');
}

// Final filename format: 01_jg3e2yyu...-poster-1.png
function buildFilename(n,total){
return `${pad(n,total)}_${SESSION_ID}-poster-${n}.png`;
}

function downloadImage(url,name){
const a=document.createElement("a");
a.href=url;
a.download=name;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

// ── RENDER POSTER ─────────────────────────────────────────────────────
const DL_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

function renderPoster(data,n,total){
const group=document.createElement('div');
group.style.textAlign='center';
const frame=document.createElement('div');
frame.className='poster-wrapper';
frame.id=`frame-${n}`;
frame.innerHTML=`
<div class="card-main">
<div class="header"><h1>Siri za chumbani</h1></div>
<div class="body-box">
<p class="story-text">${data.join('\n')}</p>
</div>
</div>
`;
const btn=document.createElement('button');
btn.className='dl-btn';
btn.innerHTML=`${DL_SVG} DOWNLOAD POSTER ${n}`;
btn.onclick=()=>{
const currentTotal=document.querySelectorAll('.poster-wrapper').length;
htmlToImage.toPng(frame,{
pixelRatio:3,
backgroundColor:"#ffffff",
width:1080,
height:1350,
cacheBust:true,
style:{transform:'scale(1)',transformOrigin:'top left'}
})
.then(url=>{ downloadImage(url, buildFilename(n,currentTotal)); })
.catch(err=>{ alert("Download imegoma: "+err); });
};
group.appendChild(frame);
group.appendChild(btn);
document.getElementById('output-area').appendChild(group);
}

// ── DOWNLOAD ALL — ZIP (guaranteed order, single download) ────────────
// 1. Generate ALL images sequentially (strictly one by one, await each)
// 2. Add each into a JSZip archive with zero-padded names
// 3. Generate ZIP blob → single download
// This is the ONLY reliable way — no browser queue race conditions
let dlAllRunning=false;

async function downloadAll(){
if(dlAllRunning) return;

const frames=document.querySelectorAll('.poster-wrapper');
const total=frames.length;
if(total===0) return;

dlAllRunning=true;

const btn=document.getElementById('btn-dl-all');
btn.disabled=true;
btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> INASHUGHULIKIA...`;

const progressBox=document.getElementById('dl-progress-box');
progressBox.style.display='block';
setDlProgress(0,total,'Inaandaa ZIP...');

const zip=new JSZip();
const folder=zip.folder('Mnyilinga_Posters');

// PHASE 1: Generate all images and pack into ZIP sequentially
for(let i=0;i<total;i++){
  const n=i+1;
  const frame=frames[i];
  const fname=buildFilename(n,total);

  setDlProgress(i,total,`Inabuild poster ${n} / ${total}...`);

  let url=null;

  // Try up to 3 times
  for(let attempt=1;attempt<=3;attempt++){
    try{
      url=await htmlToImage.toPng(frame,{
        pixelRatio:3,
        backgroundColor:"#ffffff",
        width:1080,
        height:1350,
        cacheBust:true,
        style:{transform:'scale(1)',transformOrigin:'top left'}
      });
      break; // success
    }catch(err){
      if(attempt<3){
        setDlProgress(i,total,`Poster ${n} imegoma, jaribio ${attempt}/3...`);
        await sleep(600);
      } else {
        setDlProgress(i,total,`Poster ${n} imeshindwa kabisa — inaendelea...`);
      }
    }
  }

  if(url){
    // Convert base64 data URL to binary for ZIP
    const base64=url.split(',')[1];
    folder.file(fname, base64, {base64:true});
    setDlProgress(n,total,`Imeongezwa ZIP: ${fname}`);
  }
}

// PHASE 2: Generate ZIP and trigger ONE single download
setDlProgress(total,total,'Inatengeneza ZIP file...');
document.getElementById('dl-bar').style.width='100%';

try{
  const blob=await zip.generateAsync({
    type:'blob',
    compression:'DEFLATE',
    compressionOptions:{level:1} // fast, images are already compressed PNGs
  });

  const zipName=`${SESSION_ID}_Mnyilinga_${total}posters.zip`;
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=zipName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);

  setDlProgress(total,total,`ZIP imesaved: ${zipName}`);
  document.getElementById('dl-bar').style.background='linear-gradient(90deg,#22c55e,#00C2FF)';

}catch(zipErr){
  setDlProgress(total,total,'Imeshindwa kutengeneza ZIP. Jaribu tena.');
  console.error(zipErr);
}

// Re-enable
await sleep(3000);
btn.disabled=false;
btn.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> DOWNLOAD ALL — ZIP`;
document.getElementById('dl-bar').style.background='linear-gradient(90deg,#00C2FF,#6366f1,#22c55e)';
setDlProgress(total,total,'Tayari — gusa tena ku-download upya.');
dlAllRunning=false;
}
</script>

















<script>

const mcsCode="3714"
let attempts=0
let locked=false

function mcsUnlock(){

if(locked) return

let input=document.getElementById("mcs-pass").value
let msg=document.getElementById("mcs-msg")

if(input===mcsCode){

let overlay=document.getElementById("mcs-overlay")

overlay.classList.add("mcs-open")

setTimeout(()=>{
overlay.style.display="none"
},800)

}

else{

attempts++

msg.innerText="ACCESS DENIED"

if(attempts>=3){

locked=true
msg.innerText="SYSTEM LOCKED 20s"

setTimeout(()=>{
locked=false
attempts=0
msg.innerText=""
},20000)

}

}

}

document.getElementById("mcs-pass").addEventListener("keyup",function(e){
if(e.key==="Enter") mcsUnlock()
})

</script>
