<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mnyilinga Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --orange: #fba007;
    --purple: #6e55dc;
    --green:  #0eb24c;
    --orange-dim: rgba(251,160,7,0.07);
    --bg:    #080808;
    --card:  #0c0c0c;
    --border: rgba(251,160,7,0.2);
    --text:  #f0f0f0;
    --muted: #555;
  }
  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 28px 18px 44px;
    font-family: 'Inter', sans-serif;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(251,160,7,0.025) 1px, transparent 1px),
      linear-gradient(90deg,rgba(251,160,7,0.025) 1px,transparent 1px);
    background-size:44px 44px;
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed; top:-100px; left:50%; transform:translateX(-50%);
    width:300px; height:220px;
    background:radial-gradient(ellipse,rgba(110,85,220,0.1) 0%,transparent 70%);
    pointer-events:none; z-index:0;
  }
  .header {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    margin-bottom:26px;
  }
  .logo-wrap {
    width:60px; height:60px; margin-bottom:12px;
    filter:drop-shadow(0 0 14px rgba(110,85,220,0.45));
  }
  .logo-wrap svg { width:100%; height:100%; }
  h1 {
    font-size:20px; font-weight:800; color:#fff;
    letter-spacing:-0.5px; margin-bottom:4px;
  }
  h1 span { color:var(--orange); }
  .subtitle {
    font-size:10px; font-weight:500; color:var(--muted);
    letter-spacing:2px; text-transform:uppercase;
  }
  .divider {
    width:36px; height:2px; border-radius:2px; margin-top:12px;
    background:linear-gradient(90deg, var(--purple), var(--orange), var(--green));
  }
  .section-label {
    position:relative; z-index:1;
    font-size:9px; font-weight:600;
    letter-spacing:2.5px; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, var(--border), transparent);
  }
  .grid {
    position:relative; z-index:1;
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .box {
    background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:18px 12px;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:9px; cursor:pointer;
    transition:all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
    text-align:center; min-height:116px;
    position:relative; overflow:hidden;
  }
  .box::before {
    content:''; position:absolute; top:0; left:25%; right:25%; height:1px;
    background:linear-gradient(90deg,transparent,var(--orange),transparent);
    opacity:0; transition:opacity 0.25s;
  }
  .box:hover::before,.box:active::before { opacity:1; }
  .box:hover {
    border-color:rgba(251,160,7,0.5); background:#0f0e09;
    box-shadow:0 8px 28px rgba(251,160,7,0.12);
    transform:translateY(-3px) scale(1.02);
  }
  .box:active { transform:scale(0.97); }

  .box.featured {
    grid-column:1 / -1;
    flex-direction:row; justify-content:flex-start; align-items:center;
    gap:14px; padding:18px 20px; min-height:auto;
    border-color:rgba(251,160,7,0.45);
    background:linear-gradient(135deg,#100e04,#0c0c0c);
  }
  .box.featured .box-text { text-align:left; }
  .box.featured::before { left:8%; right:8%; opacity:0.5; }

  .badge {
    position:absolute; top:10px; right:14px;
    font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:#000; background:var(--orange); padding:2px 7px; border-radius:20px;
  }
  .icon-wrap {
    width:42px; height:42px; border-radius:12px;
    background:var(--orange-dim); border:1px solid rgba(251,160,7,0.15);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.2s;
  }
  .box:hover .icon-wrap {
    background:rgba(251,160,7,0.13);
    border-color:rgba(251,160,7,0.35);
  }
  .icon-wrap svg {
    width:20px; height:20px;
    stroke:var(--orange); stroke-width:1.7;
    fill:none; stroke-linecap:round; stroke-linejoin:round;
  }
  .box.featured .icon-wrap {
    width:46px; height:46px; border-radius:13px;
    background:rgba(251,160,7,0.1); border-color:rgba(251,160,7,0.3);
  }
  .box.featured .icon-wrap svg { width:22px; height:22px; }

  .box-text h3 {
    font-size:13px; font-weight:700; color:#fff;
    margin-bottom:3px; letter-spacing:-0.1px;
  }
  .box-text p { font-size:9.5px; font-weight:400; color:var(--muted); letter-spacing:0.2px; line-height:1.4; }

  @keyframes ripple {
    0%   { transform:scale(0); opacity:0.45; }
    100% { transform:scale(5); opacity:0; }
  }
  .ripple {
    position:absolute; width:24px; height:24px; border-radius:50%;
    background:rgba(251,160,7,0.35); pointer-events:none;
    animation:ripple 0.45s ease-out forwards; transform-origin:center;
  }
  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
</style>
</head>

<script>
function go(el,url){
  var r=document.createElement('span');
  r.className='ripple';
  r.style.left=(el.offsetWidth/2-12)+'px';
  r.style.top=(el.offsetHeight/2-12)+'px';
  el.appendChild(r);
  setTimeout(function(){r.remove()},450);
  setTimeout(function(){window.location.href=url},180);
}
</script>
