<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mnyilinga Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#000;
  color:#fff;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:30px;
}

/* HEADER */
h1{
  font-size:20px;
  color:orange;
  margin-bottom:4px;
  text-align:center;
}

p{
  font-size:12px;
  color:#aaa;
  margin-bottom:12px;
  text-align:center;
}

/* GRID */
.grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  justify-items:center;
  align-items:center;
}

/* BOX STYLE */
.box{
  background:linear-gradient(145deg,#0d0d0d,#111);
  border:1px solid #ffa500;
  border-radius:18px;
  width:120px;
  height:120px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.25s;
  text-align:center;
  padding:10px;
  box-shadow:0 4px 8px rgba(255, 166, 2, 0);
}

.box:hover{
  border-color:#ffa500;
  box-shadow:0 6px 12px rgba(255,165,0,0.4);
  transform:translateY(-3px);
}

/* ICON */
.icon{
  width:36px;
  height:36px;
  stroke:orange;
  stroke-width:1.8;
  fill:none;
  margin-bottom:6px;
}

/* TEXT */
.box h3{
  font-size:13px;
  margin-bottom:2px;
}

.box p{
  font-size:10px;
  color:#bbb;
}


/* Zima text selection kwenye body yote */
body {
  -webkit-user-select: none; /* Safari */
  -moz-user-select: none;    /* Firefox */
  -ms-user-select: none;     /* IE/Edge */
  user-select: none;         /* Standard */
}





  

</style>
</head>

<body>

<h1>Mnyilinga Tools</h1>
<p>Quick access to all tools from one screen</p>

<div class="grid">

  <!-- BOX 1 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/tools/siri-confess-hub')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 3l8 4v5c0 5-3.5 9-8 10-4.5-1-8-5-8-10V7l8-4z"/>
    </svg>
    <h3>Siri Board</h3>
    <p>Private content</p>
  </div>

  <!-- BOX 2 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/siri')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M4 4h16v16H4z"/>
      <path d="M8 8h8v8H8z"/>
    </svg>
    <h3>Poster Editor</h3>
    <p>Create & edit designs</p>
  </div>

  <!-- BOX 3 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/siri')">
    <svg class="icon" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/>
    </svg>
    <h3>Main Website</h3>
    <p>Your platform</p>
  </div>

  <!-- BOX 4 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/siri')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 16V4"/>
      <path d="M8 8l4-4 4 4"/>
      <path d="M4 20h16"/>
    </svg>
    <h3>Upload</h3>
    <p>Manage files</p>
  </div>

  <!-- BOX 5 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/siri')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M3 12h18"/>
    </svg>
    <h3>Logs</h3>
    <p>System info</p>
  </div>

  <!-- BOX 6 -->
  <div class="box" onclick="go('https://mnyilinga.co.tz/siri')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 6v6l4 2"/>
    </svg>
    <h3>Tasks</h3>
    <p>Manager</p>
  </div>

</div>



<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
